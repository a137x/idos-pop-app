name: CI

on:
  pull_request:
    branches:
      - main
      - release/**
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
  push:
    branches:
      - main
  release:
    types:
      - released
 
permissions:
  id-token: write
  pull-requests: write
  contents: read
  deployments: write
  packages: write
  issues: write

jobs:
  setup-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: RDXWorks-actions/checkout@main
        with:
          fetch-depth: 0
      - name: Docker tags for idos-pop
        id: idos-pop-tags
        uses: RDXWorks-actions/metadata-action@master
        with:
          images: |
            docker.io/radixdlt/idos-pop
          tags: |
            type=sha,event=pr
            type=sha,event=branch
            type=semver,pattern={{version}}

    outputs:
      idos-pop-tags: ${{ steps.idos-pop-tags.outputs.tags }}
      idos-pop-labels: ${{ steps.idos-pop-tags.outputs.labels }}
      idos-pop-json: ${{ steps.idos-pop-tags.outputs.json }}
      
  push-idos-pop:
    name: Docker idos-pop
    needs:
      - setup-tags
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
    with:
      runs_on: ubuntu-latest
      image_registry: 'docker.io'
      image_organization: 'radixdlt'
      target: 'runner'
      image_name: 'idos-pop'
      tags: ${{ github.sha }}
      context: '.'
      dockerfile: './dockerfiles/idos.Dockerfile'
      platforms: 'linux/amd64'
      use_gh_remote_cache: true
      scan_image: false
      provenance: false
      with_sbom: false

  deploy_prod:
    if: github.event_name == 'release' && github.event.action == 'released'
    name: Deploy PROD
    needs:
      - push-idos-pop
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/jenkins-deployment.yml@main
    with:
      github_environment: 'prod'
      github_branch: '${{ github.ref }}'
      jenkins_job_name: 'kubernetes-deployments/job/idos-pop'
      application_name: 'idos-pop'
      kubernetes_namespace: 'idos-pop-mainnet'
      aws_eks_cluster: 'rtlj-prod'
      aws_iam_role_name: 'jenkins-idos-mainnet-deployer'
      helmfile_environment: 'prod'
      helmfile_extra_vars: 'ci.tag=${{ github.sha }}'
    secrets:
      aws_deployment_account_id: ${{ secrets.AWS_PROD_ACCOUNT_ID }}
      secrets_account_id: ${{ secrets.SECRETS_ACCOUNT_ID }}
      